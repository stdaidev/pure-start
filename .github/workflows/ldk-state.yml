name: LDK State and Build

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: LDK state - Bash
        run: bash scripts/ldk-check.sh .

      - name: LDK state - PowerShell
        shell: pwsh
        run: ./scripts/ldk-check.ps1 -Root .

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Production build
        run: bun run build

      - name: Report unavailable checks honestly
        run: |
          echo "No automated test script is declared; tests are unavailable, not passing."
          echo "Lint is intentionally not a release gate in this migration because the inherited baseline is red."
          echo "P3/P4 proofs must add current test and lint evidence before claiming those levels."
