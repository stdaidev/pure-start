name: LDK State and Build

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: LDK state - Bash
        run: bash scripts/ldk-check.sh .

      - name: LDK state - PowerShell
        shell: pwsh
        run: ./scripts/ldk-check.ps1 -Root .

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: TypeScript
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Tests
        run: npm test

      - name: Production build
        run: bun run build
